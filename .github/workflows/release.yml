name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Build release APK
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/biometric-app-lock-${{ github.ref_name }}.apk

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        id: gh_release
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/release/biometric-app-lock-${{ github.ref_name }}.apk
          body: ${{ steps.cliff.outputs.content }}

      - name: Upload APK artifact for mirror job
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/biometric-app-lock-${{ github.ref_name }}.apk
          retention-days: 1

  mirror:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./artifacts

      - name: Fetch release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release view "$TAG_NAME" --repo "$REPO" --json name,body,isPrerelease \
            --jq '"name=\(.name)\nprerelease=\(.isPrerelease)"' >> "$GITHUB_OUTPUT"

          echo "body<<BODY_EOF" >> "$GITHUB_OUTPUT"
          gh release view "$TAG_NAME" --repo "$REPO" --json body --jq '.body' >> "$GITHUB_OUTPUT"
          echo "BODY_EOF" >> "$GITHUB_OUTPUT"

      - name: Create mirror release
        uses: softprops/action-gh-release@v3
        with:
          repository: Xposed-Modules-Repo/eu.hxreborn.biometricapplock
          token: ${{ secrets.XPOSED_REPO_PAT }}
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ steps.release.outputs.name }}
          body: ${{ steps.release.outputs.body }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          files: ./artifacts/biometric-app-lock-*.apk
          fail_on_unmatched_files: true
          make_latest: true
